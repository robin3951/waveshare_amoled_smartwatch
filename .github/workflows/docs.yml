name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'main/**'
      - 'components/ui/**'
      - 'components/ble_chronos/**'
      - 'android-companion/app/src/**'
      - 'Doxyfile'
      - 'doxygen-awesome-css/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen docs (Firmware)
        run: doxygen Doxyfile

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Generate Dokka docs (Android)
        working-directory: android-companion
        run: gradle :app:dokkaHtml

      - name: Assemble combined site
        run: |
          mkdir -p site/firmware site/android
          cp -r docs/html/. site/firmware/
          cp -r android-companion/app/build/dokka/html/. site/android/
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Waveshare AMOLED Smartwatch — Docs</title></head>
          <body>
            <h1>Waveshare AMOLED Smartwatch — Documentation</h1>
            <ul>
              <li><a href="firmware/index.html">Firmware (Doxygen)</a></li>
              <li><a href="android/index.html">Android Companion App (Dokka / KDoc)</a></li>
            </ul>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
