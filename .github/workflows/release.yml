name: Release

# Deliberately no path filter: a release must reflect the full repo state
# regardless of whether a given push touched firmware, Android, or both.
# Path-filtered firmware-ci.yml/android-ci.yml don't always run together
# on the same commit, so this workflow builds both itself instead of
# depending on their artifacts (a bit of redundant work, but far more
# robust than trying to fetch "the latest successful artifact" across
# two independently-triggered workflows).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Needed to push the auto-bumped tag and create the GitHub Release.
permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false   # never cancel a release build mid-way

env:
  # Kept in sync with firmware-ci.yml: components/ui is excluded even
  # though it's "ours" — it's SquareLine Studio-generated LVGL UI code,
  # never hand-formatted, see firmware-ci.yml for the full reasoning.
  OWN_FIRMWARE_PATHS: "main components/ble_chronos"

jobs:
  # ── Quality gate: cppcheck only (fast). Style/clang-tidy are enforced ─────
  # ── in firmware-ci.yml on every PR before merge, no need to repeat here ──
  firmware-cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck on our own firmware code
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --error-exitcode=1 \
            $OWN_FIRMWARE_PATHS

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware with ESP-IDF v5.3 (target esp32s3)
        # merge-bin and size run in this same action invocation, not as
        # separate run: steps — idf.py only exists inside this action's
        # Docker container, never on the bare runner itself (see
        # firmware-ci.yml for the "idf.py: command not found" this caused
        # when split out).
        #
        # `-o merged_firmware.bin` (not `-o build/merged_firmware.bin`):
        # merge-bin cds into build/ internally, so a path containing
        # `build/` resolves to the non-existent build/build/... — verified
        # locally, see firmware-ci.yml for the exact FileNotFoundError.
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3
          target: esp32s3
          command: |
            idf.py build && \
            idf.py merge-bin -o merged_firmware.bin && \
            idf.py size

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/merged_firmware.bin
          retention-days: 90

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.4'

      - name: Assemble debug APK
        working-directory: android-companion
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: android-companion/app/build/outputs/apk/debug/*.apk
          retention-days: 90

  # ── Only reached if every job above succeeded — a red build never ─────────
  # ── produces a tag or a release. ──────────────────────────────────────────
  release:
    needs: [ firmware-cppcheck, firmware-build, android-build ]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full tag history needed to compute the next patch version

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: artifacts/firmware

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: apk
          path: artifacts/apk

      - name: Bump patch version tag
        # Auto-increments the patch component of the latest vX.Y.Z tag
        # (e.g. v0.1.6 -> v0.1.7) and pushes it. Chosen over Conventional-
        # Commits-based SemVer bumping to avoid depending on disciplined
        # commit message prefixes, and over fully-manual tagging because
        # we want a release on every successful main push.
        id: tag
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
          files: |
            artifacts/firmware/merged_firmware.bin
            artifacts/apk/*.apk
