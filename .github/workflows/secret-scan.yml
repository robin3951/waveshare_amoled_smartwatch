name: Secret Scan

# Repo-wide, not tied to firmware or Android paths — a leaked credential
# could land in any file (workflow YAML, gradle.properties, sdkconfig, a
# stray .env). Runs on every push/PR regardless of what changed.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # gitleaks scans full history, not just the latest commit

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          # Public repo on the free gitleaks-action tier doesn't require a
          # license key; GITHUB_TOKEN is only used to annotate findings on
          # the PR if any are found.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
